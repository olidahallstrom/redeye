services:
  - type: web
    name: red-eye-cookies-bot
    env: python
    pythonVersion: "3.11.9"          # ← THIS IS THE CRITICAL LINE
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: ADMIN_ID
        sync: false
